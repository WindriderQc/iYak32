<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About iYak32</title>
    <link rel="stylesheet" type="text/css" href="esp32.css">
    <script src="components/topMenu.js" type="text/javascript" defer></script>
    <script src="components/footer.js" type="text/javascript" defer></script>
</head>
<body>
    <header-component></header-component>

    <div class="box card-4">
        <h1>iYak32</h1>
        <p style="color:var(--text-secondary)">ESP32 + MQTT Framework</p>
        <p>Firmware: <strong style="color:var(--text-accent)" id="fwVersion">--</strong></p>
        <p>Device: <strong style="color:var(--text-accent)" id="devName">--</strong></p>
        <p>Support: <a href="mailto:sbqc@gmail.com">sbqc@gmail.com</a></p>
    </div>

    <script>
    fetch('/api/status').then(r => r.json()).then(d => {
        document.getElementById('fwVersion').textContent = d.version || 'unknown';
        document.getElementById('devName').textContent = d.device_name || 'unknown';
    }).catch(() => {});
    </script>

    <footer-component></footer-component>
</body>
</html>
