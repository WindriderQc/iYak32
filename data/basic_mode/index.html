<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Mode Control</title>
    <link rel="stylesheet" href="../esp32.css">
    <script src="../components/topMenu.js" type="text/javascript" defer></script>
    <script src="../components/footer.js" type="text/javascript" defer></script>
</head>
<body>
    <header-component></header-component>

    <div class="content-center" style="max-width:700px;">
        <h1>Basic Mode Control</h1>

        <!-- Sound Toggle -->
        <div class="control-group">
            <h2>Sound</h2>
            <div class="info-row">
                <span class="info-label">Sound Effects</span>
                <label class="switch">
                    <input type="checkbox" id="soundToggle" onchange="toggleSound()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- LEDs -->
        <div class="control-group">
            <h2>Button 1 / LED 1 (GPIO 21)</h2>
            <div class="button-placeholder">Physical Button 1</div>
            <div class="led-status" id="led1_status"></div>
        </div>

        <div class="control-group">
            <h2>Button 2 / LED 2 (GPIO 4)</h2>
            <div class="button-placeholder">Physical Button 2</div>
            <div class="led-status" id="led2_status"></div>
        </div>

        <div class="control-group">
            <h2>Button 3 / LED 3 (GPIO 15)</h2>
            <div class="button-placeholder">Physical Button 3</div>
            <div class="led-status" id="led3_status"></div>
        </div>

        <!-- Analog with Threshold Sliders -->
        <div class="control-group">
            <h2>Analog Button 1 (GPIO 34)</h2>
            <p>Value: <span id="analog1_value" style="color:var(--text-accent)">...</span></p>
            <div class="info-row">
                <span class="info-label">Threshold: <span id="analog1_threshold" style="color:var(--text-accent)">...</span></span>
                <input type="range" id="thresh1" min="0" max="4095" value="2000" style="flex:1;margin-left:12px;" onchange="setThreshold(1, this.value)">
            </div>
        </div>

        <div class="control-group">
            <h2>Analog Button 2 (GPIO 39)</h2>
            <p>Value: <span id="analog2_value" style="color:var(--text-accent)">...</span></p>
            <div class="info-row">
                <span class="info-label">Threshold: <span id="analog2_threshold" style="color:var(--text-accent)">...</span></span>
                <input type="range" id="thresh2" min="0" max="4095" value="2000" style="flex:1;margin-left:12px;" onchange="setThreshold(2, this.value)">
            </div>
        </div>
    </div>

    <script src="basic_mode.js"></script>

    <footer-component></footer-component>
</body>
</html>
