<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Setup</title>
    <link rel="stylesheet" type="text/css" href="esp32.css">
    <script src="components/topMenu.js" type="text/javascript" defer></script>
    <script src="components/footer.js" type="text/javascript" defer></script>
</head>
<body>
    <header-component></header-component>

    <h1>WiFi Setup</h1>

    <!-- Current Connection -->
    <div class="wifi-card">
        <h3 style="margin-top:0;color:var(--text-heading);">Current Connection</h3>
        <div class="info-row"><span class="info-label">Status</span><span class="info-data" id="wifiStatus">--</span></div>
        <div class="info-row"><span class="info-label">SSID</span><span class="info-data" id="wifiSSID">--</span></div>
        <div class="info-row"><span class="info-label">IP Address</span><span class="info-data" id="wifiIP">--</span></div>
        <div class="info-row"><span class="info-label">Signal</span><span class="info-data" id="wifiSignal">--</span></div>
        <div class="info-row"><span class="info-label">Mode</span><span class="info-data" id="wifiMode">--</span></div>
    </div>

    <!-- Scan -->
    <div style="text-align:center; margin:16px;">
        <button class="btn bigButton" onclick="scanNetworks()" id="scanBtn">Scan Networks</button>
    </div>

    <ul class="network-list" id="networkList"></ul>

    <!-- Manual Connect -->
    <div class="wifi-card">
        <h3 style="margin-top:0;color:var(--text-heading);">Manual Connect</h3>
        <div class="info-row">
            <span class="info-label">SSID</span>
            <input type="text" id="manualSSID" placeholder="Network name" style="flex:1;">
        </div>
        <div class="info-row">
            <span class="info-label">Password</span>
            <input type="password" id="manualPass" placeholder="Password" style="flex:1;">
        </div>
        <div style="text-align:center; margin-top:12px;">
            <button class="btn" onclick="connectManual()">Connect</button>
        </div>
    </div>

    <div id="connectMsg" style="text-align:center; margin:16px; color:var(--accent-info); display:none;"></div>

    <script>
    async function fetchWifiStatus() {
        try {
            const r = await fetch('/api/wifi/status');
            const d = await r.json();
            const dot = d.connected ? '<span style="color:var(--accent-success);">&#9679;</span> Connected' : '<span style="color:var(--accent-danger);">&#9679;</span> Disconnected';
            document.getElementById('wifiStatus').innerHTML = dot;
            document.getElementById('wifiSSID').textContent = d.ssid || 'N/A';
            document.getElementById('wifiIP').textContent = d.ip || 'N/A';
            document.getElementById('wifiSignal').textContent = (d.rssi || '--') + ' dBm';
            document.getElementById('wifiMode').textContent = d.mode || 'N/A';
        } catch(e) { console.error('WiFi status error:', e); }
    }

    function signalPercent(rssi) {
        if (rssi >= -50) return 100;
        if (rssi <= -90) return 10;
        return Math.round((rssi + 90) * 2.25);
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function scanNetworks() {
        const btn = document.getElementById('scanBtn');
        const list = document.getElementById('networkList');
        btn.textContent = 'Scanning...';
        btn.disabled = true;
        list.innerHTML = '<li style="text-align:center; color:var(--text-secondary); padding:16px;">Scanning...</li>';

        try {
            // Trigger async scan
            await fetch('/api/wifi/scan');

            // Poll for results (scan takes ~3s)
            let retries = 8;
            let nets = null;
            while (retries-- > 0) {
                await new Promise(r => setTimeout(r, 1000));
                const r = await fetch('/api/wifi/scan');
                const data = await r.json();
                if (!data.scanning) {
                    nets = Array.isArray(data) ? data : [];
                    break;
                }
            }

            if (nets === null) {
                list.innerHTML = '<li style="text-align:center; color:var(--accent-warning); padding:16px;">Scan timed out - try again</li>';
            } else if (nets.length === 0) {
                list.innerHTML = '<li style="text-align:center; color:var(--text-secondary); padding:16px;">No networks found</li>';
            } else {
                list.innerHTML = nets.map(n => `
                    <li class="network-item" onclick="selectNetwork('${escapeHtml(n.ssid).replace(/'/g,"&#39;")}')">
                        <span>
                            <span class="signal-bar" style="width:${signalPercent(n.rssi)}px;"></span>
                            <strong>${escapeHtml(n.ssid)}</strong>
                            <small style="color:var(--text-secondary); margin-left:8px;">${n.rssi} dBm</small>
                        </span>
                        <span>${n.enc ? '&#x1F512;' : '&#x1F513;'}</span>
                    </li>
                `).join('');
            }
        } catch(e) {
            list.innerHTML = '<li style="color:var(--accent-danger); text-align:center; padding:16px;">Scan failed</li>';
        }
        btn.textContent = 'Scan Networks';
        btn.disabled = false;
    }

    function selectNetwork(ssid) {
        document.getElementById('manualSSID').value = ssid;
        document.getElementById('manualPass').focus();
    }

    async function connectManual() {
        const ssid = document.getElementById('manualSSID').value.trim();
        const pass = document.getElementById('manualPass').value;
        if (!ssid) { alert('SSID required'); return; }

        const msg = document.getElementById('connectMsg');
        msg.style.display = 'block';
        msg.textContent = 'Connecting... Device will reboot.';

        try {
            await fetch('/api/wifi/connect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ssid, pass })
            });
            let countdown = 15;
            const timer = setInterval(() => {
                msg.textContent = 'Rebooting... Reconnect in ' + countdown + 's';
                countdown--;
                if (countdown < 0) {
                    clearInterval(timer);
                    msg.textContent = 'Attempting to reconnect...';
                    window.location.reload();
                }
            }, 1000);
        } catch(e) {
            msg.textContent = 'Connection request failed';
            msg.style.color = 'var(--accent-danger)';
        }
    }

    fetchWifiStatus();
    setInterval(fetchWifiStatus, 3000);
    </script>

    <footer-component></footer-component>
</body>
</html>
