<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iYak32 I/O Control</title>
    <link rel="stylesheet" type="text/css" href="colors.css">
    <link rel="stylesheet" type="text/css" href="esp32.css">
    <link rel="stylesheet" type="text/css" href="utilities.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="components/topMenu.js" type="text/javascript" defer></script>
    <script src="components/footer.js" type="text/javascript" defer></script>
</head>
<body>
    <header-component></header-component>

    <div class="io-container">
        <h1>I/O Control</h1>
        <div id="statusMessageBanner" class="status-banner"></div>

        <div class="action-buttons">
            <button id="refreshStatusBtn">&#x21BB; Refresh Status</button>
            <button id="saveConfigBtn">&#x1F4BE; Save Configuration</button>
            <button id="viewExportJsonBtn">&#x2699; View/Export JSON</button>
        </div>

        <div id="ioQuickStats" class="io-quick-stats"></div>

        <div class="io-toolbar">
            <input id="pinSearchInput" type="text" placeholder="Search GPIO or label">
            <select id="modeFilterSelect">
                <option value="ALL">All Modes</option>
                <option value="OUTPUT">Output</option>
                <option value="INPUTS">Input Family</option>
                <option value="ANALOG">Analog Only</option>
            </select>
            <select id="sortRowsSelect">
                <option value="GPIO_ASC">Sort: GPIO ↑</option>
                <option value="GPIO_DESC">Sort: GPIO ↓</option>
                <option value="LABEL_ASC">Sort: Label A→Z</option>
                <option value="DIRTY_FIRST">Sort: Dirty first</option>
            </select>
            <label class="inline io-toolbar-check">
                <input id="configuredOnlyCheckbox" type="checkbox">
                Configured only
            </label>
            <label class="inline io-toolbar-check">
                <input id="dirtyOnlyCheckbox" type="checkbox">
                Unsaved only
            </label>
            <label class="inline io-toolbar-check">
                <input id="compactViewCheckbox" type="checkbox">
                Compact view
            </label>
            <button id="resetFiltersBtn" type="button">Reset Filters</button>
        </div>

        <div id="ioInsightsPanel" class="io-insights"></div>

        <div id="ioTableWrapper" class="io-table-wrapper">
            <table id="io-table">
                <thead>
                    <tr>
                        <th>GPIO</th>
                        <th>Label</th>
                        <th>Mode</th>
                        <th>Analog</th>
                        <th>State</th>
                        <th>Value</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ioPinTableBody">
                </tbody>
            </table>
        </div>

        <h2>Pin Value Chart</h2>
        <canvas id="ioPinChart"></canvas>

        <!-- Modal for JSON Configuration -->
        <div id="jsonConfigModal" class="modal">
            <div class="modal-content">
                <span class="close-button" onclick="document.getElementById('jsonConfigModal').style.display='none'">&times;</span>
                <h2>Current I/O Configuration (JSON)</h2>
                <textarea id="jsonConfigTextarea" style="width: 98%; height: 200px;" readonly></textarea>
                <br><br>
                <button onclick="navigator.clipboard.writeText(document.getElementById('jsonConfigTextarea').value)">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <footer-component></footer-component>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const AVAILABLE_GPIOS = [0, 1, 2, 3, 4, 5, 12, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 25, 26, 27, 32, 33, 34, 35, 36, 39];
            const INPUT_ONLY_GPIOS = [34, 35, 36, 39];
            const ADC_CAPABLE_PINS = [0, 2, 4, 12, 13, 14, 15, 25, 26, 27, 32, 33, 34, 35, 36, 39];
            const tableBody = document.getElementById('ioPinTableBody');
            const statusBanner = document.getElementById('statusMessageBanner');
            const refreshStatusBtn = document.getElementById('refreshStatusBtn');
            const saveConfigBtn = document.getElementById('saveConfigBtn');
            const viewExportJsonBtn = document.getElementById('viewExportJsonBtn');
            const ioQuickStats = document.getElementById('ioQuickStats');
            const pinSearchInput = document.getElementById('pinSearchInput');
            const modeFilterSelect = document.getElementById('modeFilterSelect');
            const sortRowsSelect = document.getElementById('sortRowsSelect');
            const configuredOnlyCheckbox = document.getElementById('configuredOnlyCheckbox');
            const dirtyOnlyCheckbox = document.getElementById('dirtyOnlyCheckbox');
            const compactViewCheckbox = document.getElementById('compactViewCheckbox');
            const resetFiltersBtn = document.getElementById('resetFiltersBtn');
            const ioTableWrapper = document.getElementById('ioTableWrapper');
            const ioInsightsPanel = document.getElementById('ioInsightsPanel');
            const jsonConfigModal = document.getElementById('jsonConfigModal');
            const jsonConfigTextarea = document.getElementById('jsonConfigTextarea');
            const chartCanvas = document.getElementById('ioPinChart');
            const IO_TOOLBAR_STATE_KEY = 'iyak32_io_toolbar_state_v1';
            let ioPinChart = null;
            let currentPinConfig = [];
            let statusBannerTimeout = null;
            let isBusy = false;
            let searchDebounceTimer = null;
            let lastStatusRefresh = null;

            function displayStatusMessage(message, type = 'success') {
                if (statusBannerTimeout) {
                    clearTimeout(statusBannerTimeout);
                    statusBannerTimeout = null;
                }
                statusBanner.textContent = message;
                statusBanner.className = `status-banner status-${type}`;
                statusBanner.style.display = 'block';
                statusBannerTimeout = setTimeout(() => { statusBanner.style.display = 'none'; }, 4500);
            }

            function setControlsBusy(nextBusy) {
                isBusy = nextBusy;
                refreshStatusBtn.disabled = nextBusy;
                saveConfigBtn.disabled = nextBusy;
                viewExportJsonBtn.disabled = nextBusy;
                pinSearchInput.disabled = nextBusy;
                modeFilterSelect.disabled = nextBusy;
                sortRowsSelect.disabled = nextBusy;
                configuredOnlyCheckbox.disabled = nextBusy;
                dirtyOnlyCheckbox.disabled = nextBusy;
                compactViewCheckbox.disabled = nextBusy;
                resetFiltersBtn.disabled = nextBusy;
                tableBody.querySelectorAll('button.pin-action-toggle').forEach(button => {
                    button.disabled = nextBusy;
                });
            }

            function saveToolbarState() {
                const state = {
                    search: pinSearchInput.value,
                    mode: modeFilterSelect.value,
                    sort: sortRowsSelect.value,
                    configuredOnly: configuredOnlyCheckbox.checked,
                    dirtyOnly: dirtyOnlyCheckbox.checked,
                    compact: compactViewCheckbox.checked
                };
                localStorage.setItem(IO_TOOLBAR_STATE_KEY, JSON.stringify(state));
            }

            function loadToolbarState() {
                const rawState = localStorage.getItem(IO_TOOLBAR_STATE_KEY);
                if (!rawState) return;
                try {
                    const state = JSON.parse(rawState);
                    pinSearchInput.value = state.search || '';
                    modeFilterSelect.value = state.mode || 'ALL';
                    sortRowsSelect.value = state.sort || 'GPIO_ASC';
                    configuredOnlyCheckbox.checked = Boolean(state.configuredOnly);
                    dirtyOnlyCheckbox.checked = Boolean(state.dirtyOnly);
                    compactViewCheckbox.checked = Boolean(state.compact);
                } catch (error) {
                    localStorage.removeItem(IO_TOOLBAR_STATE_KEY);
                }
            }

            function resetFilters() {
                pinSearchInput.value = '';
                modeFilterSelect.value = 'ALL';
                sortRowsSelect.value = 'GPIO_ASC';
                configuredOnlyCheckbox.checked = false;
                dirtyOnlyCheckbox.checked = false;
                compactViewCheckbox.checked = false;
                applyCompactView();
                applyRowFilters();
                saveToolbarState();
            }

            async function parseJsonResponse(response) {
                const contentType = response.headers.get('content-type') || '';
                if (!contentType.includes('application/json')) {
                    const rawText = await response.text();
                    return { status: 'error', message: rawText || `HTTP ${response.status}` };
                }
                return response.json();
            }

            function updateQuickStats() {
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                const configuredCount = rows.filter(row => row.dataset.configured === '1').length;
                const outputCount = rows.filter(row => row.querySelector('.pin-mode-select')?.value === 'OUTPUT').length;
                const analogCount = rows.filter(row => row.querySelector('.pin-analog-checkbox')?.checked).length;
                const dirtyCount = rows.filter(row => row.dataset.dirty === '1').length;
                const visibleCount = rows.filter(row => row.style.display !== 'none').length;

                ioQuickStats.innerHTML = `
                    <span class="stat-chip">Configured: <strong>${configuredCount}</strong></span>
                    <span class="stat-chip">Visible: <strong>${visibleCount}</strong></span>
                    <span class="stat-chip">Output mode: <strong>${outputCount}</strong></span>
                    <span class="stat-chip">Analog: <strong>${analogCount}</strong></span>
                    <span class="stat-chip ${dirtyCount > 0 ? 'stat-chip-warning' : ''}">Unsaved: <strong>${dirtyCount}</strong></span>
                `;
            }

            function updateInsightsPanel() {
                const visibleRows = Array.from(tableBody.querySelectorAll('tr')).filter(row => row.style.display !== 'none');
                let digitalHigh = 0;
                let digitalLow = 0;
                const analogValues = [];

                visibleRows.forEach(row => {
                    const stateText = (row.querySelector('.pin-state')?.textContent || '').trim();
                    const valueText = (row.querySelector('.pin-value')?.textContent || '').trim();
                    const isAnalog = row.querySelector('.pin-analog-checkbox')?.checked;

                    if (stateText === 'HIGH') digitalHigh += 1;
                    if (stateText === 'LOW') digitalLow += 1;
                    if (isAnalog && valueText !== 'N/A' && !Number.isNaN(Number(valueText))) {
                        analogValues.push(Number(valueText));
                    }
                });

                const analogMin = analogValues.length ? Math.min(...analogValues) : '—';
                const analogMax = analogValues.length ? Math.max(...analogValues) : '—';
                const analogAvg = analogValues.length ? Math.round(analogValues.reduce((sum, value) => sum + value, 0) / analogValues.length) : '—';
                const refreshText = lastStatusRefresh ? `${lastStatusRefresh.toLocaleTimeString()}` : 'Not refreshed yet';

                ioInsightsPanel.innerHTML = `
                    <div class="io-insight-card"><span>Digital HIGH</span><strong>${digitalHigh}</strong></div>
                    <div class="io-insight-card"><span>Digital LOW</span><strong>${digitalLow}</strong></div>
                    <div class="io-insight-card"><span>Analog Min / Max</span><strong>${analogMin} / ${analogMax}</strong></div>
                    <div class="io-insight-card"><span>Analog Average</span><strong>${analogAvg}</strong></div>
                    <div class="io-insight-card io-insight-wide"><span>Last refresh</span><strong>${refreshText}</strong></div>
                `;
            }

            function sortRows() {
                const sortMode = sortRowsSelect.value || 'GPIO_ASC';
                const rows = Array.from(tableBody.querySelectorAll('tr'));
                const sortedRows = rows.sort((rowA, rowB) => {
                    const gpioA = Number(rowA.dataset.gpio || 0);
                    const gpioB = Number(rowB.dataset.gpio || 0);
                    const labelA = (rowA.querySelector('.pin-label-input')?.value || '').toLowerCase();
                    const labelB = (rowB.querySelector('.pin-label-input')?.value || '').toLowerCase();
                    const dirtyA = rowA.dataset.dirty === '1' ? 1 : 0;
                    const dirtyB = rowB.dataset.dirty === '1' ? 1 : 0;

                    if (sortMode === 'GPIO_DESC') return gpioB - gpioA;
                    if (sortMode === 'LABEL_ASC') return labelA.localeCompare(labelB) || gpioA - gpioB;
                    if (sortMode === 'DIRTY_FIRST') return dirtyB - dirtyA || gpioA - gpioB;
                    return gpioA - gpioB;
                });
                sortedRows.forEach(row => tableBody.appendChild(row));
            }

            function rowMatchesModeFilter(row, modeFilter) {
                if (modeFilter === 'ALL') return true;
                const mode = row.querySelector('.pin-mode-select')?.value || '';
                const isAnalog = row.querySelector('.pin-analog-checkbox')?.checked;
                if (modeFilter === 'OUTPUT') return mode === 'OUTPUT';
                if (modeFilter === 'INPUTS') return mode.startsWith('INPUT');
                if (modeFilter === 'ANALOG') return isAnalog === true;
                return true;
            }

            function applyRowFilters() {
                const searchTerm = (pinSearchInput.value || '').trim().toLowerCase();
                const modeFilter = modeFilterSelect.value || 'ALL';
                const configuredOnly = configuredOnlyCheckbox.checked;
                const dirtyOnly = dirtyOnlyCheckbox.checked;

                sortRows();

                tableBody.querySelectorAll('tr').forEach(row => {
                    const gpio = row.dataset.gpio || '';
                    const label = (row.querySelector('.pin-label-input')?.value || '').toLowerCase();
                    const matchesSearch = searchTerm === '' || gpio.includes(searchTerm) || label.includes(searchTerm);
                    const matchesConfigured = !configuredOnly || row.dataset.configured === '1';
                    const matchesDirty = !dirtyOnly || row.dataset.dirty === '1';
                    const matchesMode = rowMatchesModeFilter(row, modeFilter);
                    row.style.display = (matchesSearch && matchesConfigured && matchesMode && matchesDirty) ? '' : 'none';
                });

                updateQuickStats();
                updateInsightsPanel();
                saveToolbarState();
            }

            function applyCompactView() {
                ioTableWrapper.classList.toggle('compact-view', compactViewCheckbox.checked);
                saveToolbarState();
            }

            function bindLabelDirtyHandlers() {
                tableBody.querySelectorAll('.pin-label-input').forEach(input => {
                    input.addEventListener('input', () => markRowDirty(input.closest('tr')));
                });
            }

            function markRowDirty(row) {
                row.dataset.dirty = '1';
                row.classList.add('row-dirty');
                applyRowFilters();
            }

            function updateRowActionCell(row) {
                const actionCell = row.querySelector('.pin-actions');
                if (!actionCell) return;

                const gpio = parseInt(row.dataset.gpio, 10);
                const isConfigured = row.dataset.configured === '1';
                const mode = row.querySelector('.pin-mode-select')?.value;
                const isAnalog = row.querySelector('.pin-analog-checkbox')?.checked;
                const isInputOnly = INPUT_ONLY_GPIOS.includes(gpio);
                const canToggle = isConfigured && mode === 'OUTPUT' && !isAnalog && !isInputOnly;

                actionCell.innerHTML = '';
                if (canToggle) {
                    const toggleButton = document.createElement('button');
                    toggleButton.textContent = 'Toggle';
                    toggleButton.classList.add('pin-action-toggle');
                    toggleButton.dataset.gpio = String(gpio);
                    toggleButton.disabled = isBusy;
                    actionCell.appendChild(toggleButton);
                    return;
                }

                const note = document.createElement('span');
                note.className = 'action-note';
                if (!isConfigured) {
                    note.textContent = 'Save to enable';
                } else if (isInputOnly) {
                    note.textContent = 'Input-only pin';
                } else if (isAnalog) {
                    note.textContent = 'Analog mode';
                } else {
                    note.textContent = 'Set OUTPUT';
                }
                actionCell.appendChild(note);
            }

            function createPinRow(pinData) {
                const row = document.createElement('tr');
                row.setAttribute('data-gpio', pinData.gpio);
                row.dataset.configured = pinData.isConfigured ? '1' : '0';
                row.dataset.dirty = '0';
                if (!pinData.isConfigured) row.classList.add('row-unconfigured');

                const cellGpio = document.createElement('td');
                cellGpio.setAttribute('data-label', 'GPIO');
                cellGpio.textContent = pinData.gpio;
                row.appendChild(cellGpio);

                const cellLabel = document.createElement('td');
                cellLabel.setAttribute('data-label', 'Label');
                const labelInput = document.createElement('input');
                labelInput.type = 'text';
                labelInput.value = pinData.label || `GPIO ${pinData.gpio}`;
                labelInput.className = 'pin-label-input';
                labelInput.setAttribute('data-gpio', pinData.gpio);
                cellLabel.appendChild(labelInput);
                row.appendChild(cellLabel);

                const cellMode = document.createElement('td');
                cellMode.setAttribute('data-label', 'Mode');
                const modeSelect = document.createElement('select');
                modeSelect.className = 'pin-mode-select';
                modeSelect.setAttribute('data-gpio', pinData.gpio);
                const modes = INPUT_ONLY_GPIOS.includes(pinData.gpio) ? ["INPUT", "INPUT_PULLUP", "INPUT_PULLDOWN"] : ["OUTPUT", "INPUT", "INPUT_PULLUP", "INPUT_PULLDOWN"];
                modes.forEach(mode => {
                    const option = document.createElement('option');
                    option.value = mode;
                    option.text = mode;
                    if (pinData.mode_str === mode) option.selected = true;
                    modeSelect.appendChild(option);
                });
                cellMode.appendChild(modeSelect);
                row.appendChild(cellMode);

                const cellAnalog = document.createElement('td');
                cellAnalog.setAttribute('data-label', 'Analog');
                const analogCheckbox = document.createElement('input');
                analogCheckbox.type = 'checkbox';
                analogCheckbox.checked = (pinData.type_str === "ANALOG_INPUT");
                analogCheckbox.className = 'pin-analog-checkbox';
                analogCheckbox.setAttribute('data-gpio', pinData.gpio);
                const isAdcPin = ADC_CAPABLE_PINS.includes(pinData.gpio);
                if (modeSelect.value === "OUTPUT" || !isAdcPin) analogCheckbox.disabled = true;
                modeSelect.addEventListener('change', (event) => {
                    if (event.target.value === "OUTPUT") {
                        analogCheckbox.checked = false;
                        analogCheckbox.disabled = true;
                    } else {
                        analogCheckbox.disabled = !isAdcPin;
                        if (!isAdcPin) analogCheckbox.checked = false;
                    }
                    markRowDirty(row);
                    updateRowActionCell(row);
                });
                analogCheckbox.addEventListener('change', () => {
                    markRowDirty(row);
                    updateRowActionCell(row);
                });
                cellAnalog.appendChild(analogCheckbox);
                row.appendChild(cellAnalog);

                const cellState = document.createElement('td');
                cellState.setAttribute('data-label', 'State');
                cellState.textContent = 'N/A';
                cellState.className = 'pin-state';
                row.appendChild(cellState);

                const cellValue = document.createElement('td');
                cellValue.setAttribute('data-label', 'Value');
                cellValue.textContent = 'N/A';
                cellValue.className = 'pin-value';
                row.appendChild(cellValue);

                const cellActions = document.createElement('td');
                cellActions.setAttribute('data-label', 'Actions');
                cellActions.className = 'pin-actions';
                row.appendChild(cellActions);
                updateRowActionCell(row);
                return row;
            }

            function buildChartDatasets(graphedPinsData) {
                const colors = ['#e94560', '#64ffda', '#2196f3', '#ff9800', '#4caf50', '#9c27b0', '#ffeb3b', '#00bcd4'];
                return graphedPinsData.map((pin, i) => ({
                    label: pin.label || `GPIO ${pin.gpio}`,
                    data: [],
                    borderColor: colors[i - Math.floor(i / colors.length) * colors.length],
                    backgroundColor: colors[i - Math.floor(i / colors.length) * colors.length],
                    fill: false,
                    tension: 0.1,
                    hidden: false,
                    _gpio: pin.gpio
                }));
            }

            function initializeChart(pin_config_array) {
                if (ioPinChart) ioPinChart.destroy();
                const chartablePins = pin_config_array.filter(pin => pin.graph === true);
                const datasets = buildChartDatasets(chartablePins);
                ioPinChart = new Chart(chartCanvas.getContext('2d'), {
                    type: 'line',
                    data: { labels: [], datasets: datasets },
                    options: {
                        responsive: true,
                        scales: {
                            x: { title: { display: true, text: 'Time' } },
                            y: { title: { display: true, text: 'Value' } }
                        },
                        animation: { duration: 0 }
                    }
                });
            }

            function updateChart(pinValues) {
                if (!ioPinChart) return;
                const now = new Date();
                const timeLabel = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                ioPinChart.data.labels.push(timeLabel);
                if (ioPinChart.data.labels.length > 30) ioPinChart.data.labels.shift();
                ioPinChart.data.datasets.forEach(dataset => {
                    const value = pinValues.hasOwnProperty(dataset._gpio) ? pinValues[dataset._gpio] : NaN;
                    dataset.data.push(value);
                    if (dataset.data.length > 30) dataset.data.shift();
                });
                ioPinChart.update();
            }

            async function fetchPinConfigAndPopulateTable() {
                try {
                    setControlsBusy(true);
                    const response = await fetch('/api/io/config');
                    if (!response.ok) throw new Error(`Failed to fetch pin configuration (${response.status})`);
                    const configFromServer = await response.json();
                    currentPinConfig = configFromServer.io_pins || [];
                    tableBody.innerHTML = '';
                    AVAILABLE_GPIOS.forEach(gpio => {
                        let pinData = currentPinConfig.find(p => p.gpio === gpio);
                        if (!pinData) {
                            pinData = {
                                gpio: gpio,
                                mode_str: "INPUT",
                                label: `GPIO ${gpio}`,
                                type_str: "DIGITAL",
                                initial_state_str: "",
                                graph: false,
                                isConfigured: false
                            };
                        } else {
                            pinData.mode_str = pinData.mode_str || pinData.mode || (INPUT_ONLY_GPIOS.includes(gpio) ? "INPUT" : "OUTPUT");
                            pinData.type_str = pinData.type_str || pinData.type || "DIGITAL";
                            pinData.initial_state_str = pinData.initial_state_str || pinData.initial_state || "";
                            pinData.graph = pinData.graph || false;
                            pinData.isConfigured = true;
                        }
                        tableBody.appendChild(createPinRow(pinData));
                    });
                    bindLabelDirtyHandlers();
                    initializeChart(currentPinConfig);
                    await fetchAllPinStatuses();
                    applyRowFilters();
                    displayStatusMessage('Pin configuration loaded.', 'success');
                } catch (error) {
                    displayStatusMessage(`Error loading pin configuration: ${error.message}`, 'error');
                    tableBody.innerHTML = '';
                    AVAILABLE_GPIOS.forEach(gpio => {
                        const pinData = { gpio, mode_str: "INPUT", label: `GPIO ${gpio}`, type_str: "DIGITAL", graph: false, isConfigured: false };
                        tableBody.appendChild(createPinRow(pinData));
                    });
                    bindLabelDirtyHandlers();
                    initializeChart([]);
                    applyRowFilters();
                } finally {
                    setControlsBusy(false);
                }
            }

            async function fetchAllPinStatuses(force = false) {
                if (isBusy && !force) return;
                try {
                    const response = await fetch('/api/io/status');
                    if (!response.ok) throw new Error(`Failed to fetch statuses (${response.status})`);
                    const statusData = await response.json();
                    const pinValuesForChart = {};
                    if (statusData.statuses && Array.isArray(statusData.statuses)) {
                        statusData.statuses.forEach(status => {
                            const row = tableBody.querySelector(`tr[data-gpio="${status.gpio}"]`);
                            if (row) {
                                const stateCell = row.querySelector('.pin-state');
                                const valueCell = row.querySelector('.pin-value');
                                if (valueCell) valueCell.textContent = status.value;
                                const pinCfg = currentPinConfig.find(p => p.gpio === status.gpio);
                                if (pinCfg) {
                                    pinCfg.value = status.value;
                                    if (pinCfg.type_str === "DIGITAL") {
                                        if (stateCell) stateCell.textContent = status.value ? 'HIGH' : 'LOW';
                                    } else if (pinCfg.type_str === "ANALOG_INPUT") {
                                        if (stateCell) stateCell.textContent = 'N/A';
                                    }
                                    if (pinCfg.graph === true) pinValuesForChart[status.gpio] = status.value;
                                }
                            }
                        });
                    }
                    updateChart(pinValuesForChart);
                } catch (error) {
                    displayStatusMessage(`Error fetching pin statuses: ${error.message}`, 'error');
                }
            }

            async function saveConfiguration() {
                const payload = { io_pins: [] };
                tableBody.querySelectorAll('tr').forEach(row => {
                    const gpio = parseInt(row.dataset.gpio);
                    const label = row.querySelector('.pin-label-input').value;
                    const mode_str = row.querySelector('.pin-mode-select').value;
                    const isAnalogChecked = row.querySelector('.pin-analog-checkbox').checked;
                    const type_str = isAnalogChecked ? "ANALOG_INPUT" : "DIGITAL";
                    payload.io_pins.push({
                        gpio, label,
                        mode: mode_str,
                        type: type_str,
                        initial_state: "",
                        graph: isAnalogChecked
                    });
                });
                try {
                    setControlsBusy(true);
                    displayStatusMessage('Saving configuration...', 'info');
                    const response = await fetch('/api/io/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await parseJsonResponse(response);
                    if (!response.ok) {
                        throw new Error(result.message || `Failed to save (${response.status})`);
                    }
                    displayStatusMessage(result.message || 'Configuration saved. Refreshing.', 'success');
                    await fetchPinConfigAndPopulateTable();
                } catch (error) {
                    displayStatusMessage(`Error saving: ${error.message}`, 'error');
                } finally {
                    setControlsBusy(false);
                }
            }

            refreshStatusBtn.addEventListener('click', fetchAllPinStatuses);
            saveConfigBtn.addEventListener('click', saveConfiguration);
            pinSearchInput.addEventListener('input', () => {
                clearTimeout(searchDebounceTimer);
                searchDebounceTimer = setTimeout(applyRowFilters, 140);
            });
            modeFilterSelect.addEventListener('change', applyRowFilters);
            sortRowsSelect.addEventListener('change', applyRowFilters);
            configuredOnlyCheckbox.addEventListener('change', applyRowFilters);
            dirtyOnlyCheckbox.addEventListener('change', applyRowFilters);
            compactViewCheckbox.addEventListener('change', applyCompactView);
            resetFiltersBtn.addEventListener('click', resetFilters);

            document.addEventListener('keydown', (event) => {
                if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
                    event.preventDefault();
                    saveConfiguration();
                }
            });

            tableBody.addEventListener('click', function(event) {
                if (event.target.classList.contains('pin-action-toggle')) {
                    const gpio = event.target.dataset.gpio;
                    if (gpio) handleTogglePin(parseInt(gpio));
                }
            });

                    lastStatusRefresh = new Date();
                    updateInsightsPanel();
            async function handleTogglePin(gpio) {
                try {
                    setControlsBusy(true);
                    const response = await fetch(`/api/io/toggle?gpio=${gpio}`, { method: 'POST' });
                    const result = await parseJsonResponse(response);
                    console.log('Toggle response:', response.status, JSON.stringify(result));
                    if (response.ok && result.status === 'success') {
                        displayStatusMessage(result.message || `GPIO ${gpio} toggled.`, 'success');
                        await fetchAllPinStatuses();
                    } else {
                        throw new Error(result.message || `Failed to toggle GPIO ${gpio}.`);
                    }
                } catch (error) {
                    displayStatusMessage(`Error: ${error.message}`, 'error');
                } finally {
                    setControlsBusy(false);
                }
            }

            viewExportJsonBtn.addEventListener('click', () => {
                const currentFullConfig = [];
                tableBody.querySelectorAll('tr').forEach(row => {
                    const gpio = parseInt(row.dataset.gpio);
                    const label = row.querySelector('.pin-label-input').value;
                    const mode = row.querySelector('.pin-mode-select').value;
                    const isAnalog = row.querySelector('.pin-analog-checkbox').checked;
                    const stateText = row.querySelector('.pin-state').textContent;
                    const valueText = row.querySelector('.pin-value').textContent;
                    currentFullConfig.push({
                        gpio, label, mode, isAnalog,
                        state: stateText === 'HIGH' ? 1 : (stateText === 'LOW' ? 0 : undefined),
                        value: valueText !== 'N/A' ? parseInt(valueText) : undefined
                    });
                });
                jsonConfigTextarea.value = JSON.stringify({ pins: currentFullConfig }, null, 2);
                jsonConfigModal.style.display = 'block';
            });

            loadToolbarState();
            applyCompactView();
            fetchPinConfigAndPopulateTable();
            setInterval(fetchAllPinStatuses, 5000);
        });
    </script>
</body>
</html>
