<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tide Chart</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/0.5.7/chartjs-plugin-annotation.min.js"></script>
    <link rel="stylesheet" type="text/css" href="colors.css">
    <link rel="stylesheet" type="text/css" href="esp32.css">
    <link rel="stylesheet" type="text/css" href="utilities.css">
    <script src="components/topMenu.js" type="text/javascript" defer></script>
    <script src="components/footer.js" type="text/javascript" defer></script>
</head>
<body>
    <header-component></header-component>

    <h1>Current Tide Level in Quebec</h1>
    <p id="currentTide"></p>

    <div style="position: relative; width: 100%; max-width: 1024px; margin: 0 auto; padding: 0 16px;">
        <canvas id="tideChart"></canvas>
    </div>

    <script>
    let tideData = [];
    let tideTimes = [];
    let apikeyTides = '';

    async function loadTidesKey() {
        try {
            const resp = await fetch('/api/tides/key');
            const data = await resp.json();
            apikeyTides = data.key || '';
        } catch (e) {
            console.error('Failed to load tides API key:', e);
        }
    }

    async function fetchData() {
        if (!apikeyTides) await loadTidesKey();
        if (!apikeyTides) {
            document.getElementById('currentTide').textContent = 'Tides API key not configured.';
            return;
        }

        // Fetch coordinates from device config (dynamic location)
        let lat = 46.8139, lon = -71.2082;
        try {
            const coordResp = await fetch('/api/config/tides');
            const coordData = await coordResp.json();
            if (coordData.lat) lat = coordData.lat;
            if (coordData.lon) lon = coordData.lon;
        } catch(e) { console.warn('Using default coordinates'); }

        let data;
        const cachedData = localStorage.getItem('tideData');
        const lastFetched = localStorage.getItem('lastFetched');

        if (cachedData && moment().diff(moment(lastFetched), 'minutes') < 60) {
            data = JSON.parse(cachedData);
            console.log('Using cached tide data');
        } else {
            console.log('Fetching fresh tide data from API');
            const response = await fetch('https://www.worldtides.info/api/v3?heights&extremes&key=' + apikeyTides + '&lat=' + lat + '&lon=' + lon + '&days=4');
            data = await response.json();
            localStorage.setItem('tideData', JSON.stringify(data));
            localStorage.setItem('lastFetched', moment().toISOString());
        }

        if (data.heights && data.heights.length > 0) {
            tideData = data.heights.map(h => h.height);
            tideTimes = data.heights.map(h => moment.unix(h.dt).toDate());

            const ctx = document.getElementById('tideChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: tideTimes,
                    datasets: [{
                        label: 'Tide Height (m)',
                        data: tideData,
                        borderColor: '#64ffda',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: 'rgba(100,255,218,0.08)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        xAxes: [{
                            type: 'time',
                            time: {
                                tooltipFormat: 'ddd D MMM  HH:mm',
                                unit: 'hour',
                                displayFormats: { hour: 'ddd D MMM  HH:mm' }
                            },
                            ticks: {
                                fontColor: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#a0a0c0',
                                callback: function(value, index, values) {
                                    if (values[index] instanceof Date) {
                                        return moment(values[index]).format('ddd D MMM  HH:mm');
                                    }
                                    return value;
                                }
                            },
                            gridLines: { color: document.documentElement.dataset.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' }
                        }],
                        yAxes: [{
                            ticks: { fontColor: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#a0a0c0' },
                            gridLines: { color: document.documentElement.dataset.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' }
                        }]
                    },
                    legend: { labels: { fontColor: getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim() || '#e8e8e8' } },
                    annotation: {
                        annotations: [{
                            type: 'line',
                            mode: 'vertical',
                            scaleID: 'x-axis-0',
                            value: moment().toDate(),
                            borderColor: '#e94560',
                            borderWidth: 2,
                            label: { content: 'Now', enabled: true, position: 'top' }
                        }]
                    }
                }
            });
        }
    }

    fetchData();
    </script>

    <footer-component></footer-component>
</body>
</html>
