<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iYak32 Boat</title>
    <link rel="stylesheet" type="text/css" href="../colors.css">
    <link rel="stylesheet" type="text/css" href="../esp32.css">
    <link rel="stylesheet" type="text/css" href="../utilities.css">
    <script src="../components/topMenu.js" type="text/javascript" defer></script>
    <script src="../components/footer.js" type="text/javascript" defer></script>
</head>
<body>
    <header-component></header-component>

    <div class="content-center" style="max-width:600px;">

    <h1>Boat Dashboard</h1>

    <p>Current Time: %TIME%</p>

    <div class="info-form">
        <div class="info-row">
            <label class="info-label">Latitude:</label>
            <span class="info-data">%LAT%&deg;</span>
        </div>
        <div class="info-row">
            <label class="info-label">Longitude:</label>
            <span class="info-data">%LON%&deg;</span>
        </div>
    </div>

    <div class="card" style="margin:20px 0; text-align:left; padding:20px;">
        <h3>Weather</h3>
        <p>Temperature: <strong style="color:var(--text-accent)">%TEMP%</strong></p>
        <p>Pressure: <strong style="color:var(--text-accent)">%PRESSION% hPa</strong></p>

        <h3>Boat Stats</h3>
        <p>Speed: <strong style="color:var(--text-accent)">%SPEED%</strong></p>
        <p>Direction: <strong style="color:var(--text-accent)">%DIR%&deg;</strong></p>

        <div style="text-align:center; margin-top:16px;">
            <a href="/speedUp"><button type="button" class="btn bigButton">Speed Up</button></a>
            <a href="/slowDown"><button type="button" class="btn bigButton red">Slow Down</button></a>
        </div>
    </div>

    <p>GPIO state: <strong>%STATE%</strong></p>
    <p>
        <a href="/on"><button type="button" class="btn bigButton">ON</button></a>
        <a href="/off"><button type="button" class="btn bigButton red">OFF</button></a>
    </p>

    </div>

    <footer-component></footer-component>
</body>
</html>
